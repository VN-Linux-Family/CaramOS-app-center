# App Explorer Theme Configuration
# ╔══════════════════════════════════════════════════════════════════╗
# ║        APP EXPLORER — THEME: forest-dark                       ║
# ║    Giao diện tối, xanh lá rừng, cổ điển terminal feel         ║
# ╚══════════════════════════════════════════════════════════════════╝

[theme]
name            = forest-dark
version         = 1.0
author          = App Explorer Team
description     = Giao diện tối, màu xanh lá rừng đậm, phong cách terminal
dark_mode       = true
follow_system   = false

[colors.base]
bg_primary      = #0F1A14
bg_secondary    = #162210
bg_card         = #1C2A1E
bg_card_hover   = #223428
bg_card_selected= #1E3020
bg_elevated     = #1C2A1E
bg_sunken       = #0A1209
border_light    = #2A3C2C
border_normal   = #3A5040
border_focus    = #5A9A6A
border_error    = #E05050

[colors.text]
primary         = #D8F0DA
secondary       = #90B898
disabled        = #4A6A50
on_dark         = #D8F0DA
link            = #7AD0A0
link_hover      = #A0E8C0
error           = #E07070
success         = #70D090
warning         = #D0A040
info            = #60A8D0

[colors.accent]
primary         = #5A9A6A
hover           = #70B880
pressed         = #3A7A4A
light           = #1E3020
border          = #4A8A5A

[colors.nav]
bg              = #0A1209
item_hover_bg   = #1C2A1E
item_active_bg  = #2A4030
item_text       = #90B898
item_hover_text = #D8F0DA
item_active_text= #90D0A0
border          = #2A3C2C
shadow          = #00000060

[colors.button]
bg              = #1C2A1E
bg_hover        = #5A9A6A
bg_pressed      = #3A7A4A
bg_disabled     = #1A2218
text            = #A0C8A8
text_hover      = #FFFFFF
text_pressed    = #FFFFFF
text_disabled   = #4A6A50
border          = #3A5040
border_hover    = #5A9A6A
border_pressed  = #3A7A4A
border_disabled = #2A3C2C

danger_bg           = #1C2A1E
danger_bg_hover     = #8A2A2A
danger_text         = #E07070
danger_text_hover   = #FFFFFF
danger_border       = #8A4A4A
danger_border_hover = #C03030

primary_bg          = #5A9A6A
primary_bg_hover    = #70B880
primary_text        = #FFFFFF
primary_text_hover  = #FFFFFF
primary_border      = #4A8A5A
primary_border_hover= #3A7A4A

[colors.statusbar]
bg              = #0A1209
text            = #70A878
border          = #2A3C2C
progress_bg     = #2A3C2C
progress_fill   = #5A9A6A

[colors.console]
bg              = #080E09
text            = #C0D8C4
text_cmd        = #70D090
text_stdout     = #C0D8C4
text_stderr     = #D0A040
text_error      = #E07070
text_success    = #70D090
text_info       = #5A8A70
border          = #2A4030
header_bg       = #050A06
header_text     = #70D090

[colors.badge]
bg              = #1E3020
text            = #70B878
border          = #3A5040
installed_bg    = #1E3828
installed_text  = #70D090
installed_border= #4A9A6A

[colors.scrollbar]
track           = #0A1209
thumb           = #2A4030
thumb_hover     = #3A6040
thumb_active    = #5A9A6A

[colors.tooltip]
bg              = #0A1209
text            = #D8F0DA
border          = #3A5040

[colors.dialog]
bg              = #1C2A1E
overlay         = #00000080
header_bg       = #162210
header_text     = #D8F0DA
border          = #3A5040
shadow          = #00000060

[colors.search]
bg              = #0A1209
text            = #D8F0DA
placeholder     = #4A6A50
border          = #3A5040
border_focus    = #5A9A6A
icon            = #5A8A70
bg_focus        = #0F1A14

[typography]
font_ui         = Cantarell
font_ui_size    = 10
font_title      = Cantarell
font_title_size = 14
font_title_weight = bold
font_subtitle   = Cantarell
font_subtitle_size = 9
font_mono       = Monospace
font_mono_size  = 9
font_button     = Cantarell
font_button_size= 10
font_button_weight = normal
font_nav        = Cantarell
font_nav_size   = 10
font_nav_weight = normal
font_badge      = Cantarell
font_badge_size = 8

[layout]
window_width        = 1100
window_height       = 720
window_min_width    = 800
window_min_height   = 560
nav_width           = 200
nav_item_height     = 40
nav_item_padding_h  = 16
nav_item_padding_v  = 8
nav_icon_size       = 16
content_padding     = 20
content_gap         = 16
card_width          = 220
card_height         = 280
card_padding        = 16
card_gap            = 12
card_icon_size      = 64
list_row_height     = 72
list_icon_size      = 48
list_padding_h      = 16
list_padding_v      = 8
detail_panel_width  = 380
console_height      = 200
console_min_height  = 80
console_max_height  = 400
statusbar_height    = 28
toolbar_height      = 48
search_width        = 280
search_height       = 32

[radius]
window          = 0
card            = 6
button          = 4
button_small    = 3
input           = 4
tooltip         = 4
dialog          = 8
console         = 4
image           = 6
nav_item        = 4
progress        = 3
scrollbar_thumb = 3

[shadows]
card            = 0 1px 4px #00000040
card_hover      = 0 4px 12px #00000060
button          = none
dialog          = 0 8px 32px #00000080
nav             = 2px 0 12px #00000060
toolbar         = 0 1px 6px #00000040

[animation]
enabled         = true
hover_duration  = 150
transition      = 200
page_fade       = 100
easing          = ease-out

[icons]
icon_theme      = hicolor
icon_fallback   = symbolic
nav_icon_size   = 16
button_icon_size= 14

[misc]
show_console_auto           = true
collapse_console_on_finish  = false
default_view                = grid
grid_columns                = 4
show_category_badge         = true
show_installed_badge        = true
uninstalled_icon_opacity    = 0.7

[gtk_extra]
extra_css_file  =
inline_css      =
