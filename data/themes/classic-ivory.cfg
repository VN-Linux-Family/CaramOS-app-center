# App Explorer Theme Configuration
# Format: .cfg (INI-like)
# Encoding: UTF-8
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║         APP EXPLORER — THEME: classic-ivory (default)          ║
# ║  Phong cách cổ điển, trắng ngà, hơi vàng, tối giản tinh tế    ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# HƯỚNG DẪN RICING:
# Tất cả các giá trị màu theo hex: #RRGGBB hoặc #RRGGBBAA
# opacity: 0.0 (trong suốt) → 1.0 (đục hoàn toàn)
# radius: pixel bo cong góc
# Fonts: tên font hệ thống, vd: "Monospace", "Sans", "Serif"
#        dùng "system" để lấy font mặc định của GTK theme
# Sizes: đơn vị pixel (px)

[theme]
name            = classic-ivory
version         = 1.0
author          = App Explorer Team
description     = Giao diện cổ điển, trắng ngà tinh tế
dark_mode       = false
# Nếu follow_system = true thì tự động theo dark/light mode của hệ thống
follow_system   = false

# ──────────────────────────────────────────────
# [colors.base] — Màu nền cơ bản
# ──────────────────────────────────────────────
[colors.base]
# Màu nền chính của toàn bộ app
bg_primary      = #FAF6EF
# Màu nền thứ cấp (panel, sidebar)
bg_secondary    = #F0EBE1
# Màu nền card/item
bg_card         = #FFFFFF
# Màu nền card khi hover
bg_card_hover   = #F5F0E8
# Màu nền card khi selected
bg_card_selected= #E8F5E9
# Màu nền elevated (dialog, popup)
bg_elevated     = #FFFFFF
# Màu nền sunken (input, console)
bg_sunken       = #EEEBE3
# Màu border/separator nhẹ
border_light    = #D8D0C4
# Màu border rõ hơn
border_normal   = #C4BAA8
# Màu border focus
border_focus    = #4A7C59
# Màu border error
border_error    = #C0392B

# ──────────────────────────────────────────────
# [colors.text] — Màu chữ
# ──────────────────────────────────────────────
[colors.text]
# Chữ chính
primary         = #2C2416
# Chữ phụ (subtitle, label)
secondary       = #6B5D4A
# Chữ tắt (disabled)
disabled        = #ADA090
# Chữ trên nền tối (navigation, badge)
on_dark         = #FAF6EF
# Chữ link
link            = #2E6B45
# Chữ link hover
link_hover      = #1A4A2E
# Chữ error
error           = #C0392B
# Chữ success
success         = #2E6B45
# Chữ warning
warning         = #B7770D
# Chữ info
info            = #1A6B8A

# ──────────────────────────────────────────────
# [colors.accent] — Màu nhấn (xanh lá đậm)
# ──────────────────────────────────────────────
[colors.accent]
# Màu accent chính
primary         = #2E6B45
# Accent hover (đậm hơn)
hover           = #1A4A2E
# Accent pressed
pressed         = #0F2E1A
# Accent light (background nhẹ)
light           = #E8F5E9
# Accent border
border          = #4A7C59

# ──────────────────────────────────────────────
# [colors.nav] — Thanh Navigation
# ──────────────────────────────────────────────
[colors.nav]
# Nền navigation bar
bg              = #2E6B45
# Nền item hover
item_hover_bg   = #FFFFFF
# Nền item selected/active
item_active_bg  = #1A4A2E
# Chữ nav item
item_text       = #FAF6EF
# Chữ nav item khi hover
item_hover_text = #2C2416
# Chữ nav item khi active
item_active_text= #FAF6EF
# Border bottom của nav
border          = #1A4A2E
# Shadow nav
shadow          = #00000026

# ──────────────────────────────────────────────
# [colors.button] — Nút bấm
# ──────────────────────────────────────────────
[colors.button]
# Nền mặc định (trắng hạt gạo)
bg              = #FFFFFF
# Nền hover (chuyển từ từ sang xanh lá)
bg_hover        = #2E6B45
# Nền pressed
bg_pressed      = #1A4A2E
# Nền disabled
bg_disabled     = #E8E4DC
# Chữ mặc định
text            = #2C2416
# Chữ hover
text_hover      = #FFFFFF
# Chữ pressed
text_pressed    = #FFFFFF
# Chữ disabled
text_disabled   = #ADA090
# Viền nút
border          = #C4BAA8
# Viền nút hover
border_hover    = #2E6B45
# Viền nút pressed
border_pressed  = #1A4A2E
# Viền nút disabled
border_disabled = #D8D0C4

# Nút nguy hiểm (uninstall, delete)
danger_bg           = #FFFFFF
danger_bg_hover     = #C0392B
danger_text         = #C0392B
danger_text_hover   = #FFFFFF
danger_border       = #C0392B
danger_border_hover = #8E2219

# Nút primary/CTA (install)
primary_bg          = #2E6B45
primary_bg_hover    = #1A4A2E
primary_text        = #FFFFFF
primary_text_hover  = #FFFFFF
primary_border      = #1A4A2E
primary_border_hover= #0F2E1A

# ──────────────────────────────────────────────
# [colors.statusbar] — Thanh trạng thái dưới cùng
# ──────────────────────────────────────────────
[colors.statusbar]
bg              = #EDE8DF
text            = #6B5D4A
border          = #D8D0C4
progress_bg     = #D8D0C4
progress_fill   = #2E6B45

# ──────────────────────────────────────────────
# [colors.console] — Cửa sổ console log
# ──────────────────────────────────────────────
[colors.console]
# Nền console (tối để contrast với chữ monospace)
bg              = #1A1612
# Chữ mặc định
text            = #E8DFD0
# Chữ command
text_cmd        = #A8D5B5
# Chữ output bình thường
text_stdout     = #E8DFD0
# Chữ stderr/warning
text_stderr     = #F0C080
# Chữ error
text_error      = #F08080
# Chữ success
text_success    = #80D0A0
# Chữ info/dim
text_info       = #90A098
# Border console
border          = #2E6B45
# Header console
header_bg       = #0F0E0B
header_text     = #A8D5B5

# ──────────────────────────────────────────────
# [colors.badge] — Badge/Tag category
# ──────────────────────────────────────────────
[colors.badge]
bg              = #E8EDE0
text            = #3A5A30
border          = #B0C8A8
installed_bg    = #E8F5E9
installed_text  = #2E6B45
installed_border= #4A9A5A

# ──────────────────────────────────────────────
# [colors.scrollbar] — Scrollbar
# ──────────────────────────────────────────────
[colors.scrollbar]
track           = #EDE8DF
thumb           = #C4BAA8
thumb_hover     = #A09080
thumb_active    = #2E6B45

# ──────────────────────────────────────────────
# [colors.tooltip] — Tooltip
# ──────────────────────────────────────────────
[colors.tooltip]
bg              = #2C2416
text            = #FAF6EF
border          = #4A3A28

# ──────────────────────────────────────────────
# [colors.dialog] — Dialog/Modal
# ──────────────────────────────────────────────
[colors.dialog]
bg              = #FFFFFF
overlay         = #00000066
header_bg       = #F0EBE1
header_text     = #2C2416
border          = #C4BAA8
shadow          = #00000033

# ──────────────────────────────────────────────
# [colors.search] — Thanh tìm kiếm
# ──────────────────────────────────────────────
[colors.search]
bg              = #FFFFFF
text            = #2C2416
placeholder     = #ADA090
border          = #C4BAA8
border_focus    = #2E6B45
icon            = #8A7A68
bg_focus        = #FFFFFF

# ──────────────────────────────────────────────
# [typography] — Font chữ
# ──────────────────────────────────────────────
[typography]
# Font UI chính
font_ui         = Cantarell
font_ui_size    = 10

# Font tiêu đề lớn (app name, window title)
font_title      = Cantarell
font_title_size = 14
font_title_weight = bold

# Font phụ đề (subtitle, description)
font_subtitle   = Cantarell
font_subtitle_size = 9

# Font monospace (console, version, checksum)
font_mono       = Monospace
font_mono_size  = 9

# Font nút bấm
font_button     = Cantarell
font_button_size= 10
font_button_weight = normal

# Font nav
font_nav        = Cantarell
font_nav_size   = 10
font_nav_weight = normal

# Font badge/tag
font_badge      = Cantarell
font_badge_size = 8

# ──────────────────────────────────────────────
# [layout] — Kích thước và khoảng cách
# ──────────────────────────────────────────────
[layout]
# Kích thước cửa sổ mặc định
window_width        = 1100
window_height       = 720
window_min_width    = 800
window_min_height   = 560

# Navigation bar
nav_width           = 200
nav_item_height     = 40
nav_item_padding_h  = 16
nav_item_padding_v  = 8
nav_icon_size       = 16

# Content area
content_padding     = 20
content_gap         = 16

# App card trong grid
card_width          = 220
card_height         = 280
card_padding        = 16
card_gap            = 12
card_icon_size      = 64

# App list row (list view)
list_row_height     = 72
list_icon_size      = 48
list_padding_h      = 16
list_padding_v      = 8

# Detail panel
detail_panel_width  = 380

# Console
console_height      = 200
console_min_height  = 80
console_max_height  = 400

# Statusbar
statusbar_height    = 28

# Toolbar/searchbar
toolbar_height      = 48
search_width        = 280
search_height       = 32

# ──────────────────────────────────────────────
# [radius] — Bo cong góc
# ──────────────────────────────────────────────
[radius]
# Cửa sổ chính
window          = 0
# Card ứng dụng
card            = 8
# Nút bấm (hơi bo cong nhẹ)
button          = 4
# Nút nhỏ (badge, tag)
button_small    = 3
# Input/search field
input           = 4
# Tooltip
tooltip         = 4
# Dialog
dialog          = 8
# Console area
console         = 4
# Image/screenshot
image           = 6
# Navigation item
nav_item        = 4
# Progress bar
progress        = 3
# Scrollbar thumb
scrollbar_thumb = 3

# ──────────────────────────────────────────────
# [shadows] — Đổ bóng (GTK box-shadow)
# ──────────────────────────────────────────────
[shadows]
# Bóng card
card            = 0 1px 3px #0000001A, 0 1px 2px #0000001A
# Bóng card hover
card_hover      = 0 4px 8px #0000001A, 0 2px 4px #0000001A
# Bóng nút
button          = none
# Bóng dialog
dialog          = 0 8px 32px #00000033
# Bóng nav
nav             = 2px 0 8px #00000014
# Bóng toolbar
toolbar         = 0 1px 4px #0000001A

# ──────────────────────────────────────────────
# [animation] — Animation & Transitions
# ──────────────────────────────────────────────
[animation]
# Bật/tắt tất cả animation
enabled         = true
# Thời gian transition màu hover (ms)
hover_duration  = 150
# Thời gian transition chung (ms)
transition      = 200
# Thời gian load page (ms)
page_fade       = 100
# Easing function (linear / ease / ease-in / ease-out / ease-in-out)
easing          = ease-out

# ──────────────────────────────────────────────
# [icons] — Icon set
# ──────────────────────────────────────────────
[icons]
# Tên icon theme hệ thống dùng cho icon giao diện
icon_theme      = hicolor
# Fallback nếu không có icon theme
icon_fallback   = symbolic
# Kích thước icon nav (px)
nav_icon_size   = 16
# Kích thước icon button (px)
button_icon_size= 14

# ──────────────────────────────────────────────
# [misc] — Các cài đặt khác
# ──────────────────────────────────────────────
[misc]
# Hiển thị console mặc định khi install/uninstall
show_console_auto   = true
# Tự thu gọn console khi hoàn thành
collapse_console_on_finish = false
# Hiển thị grid hay list mặc định
default_view        = grid
# Số cột grid
grid_columns        = 4
# Hiển thị category badge trên card
show_category_badge = true
# Hiển thị nút installed overlay
show_installed_badge= true
# Độ mờ icon app chưa cài
uninstalled_icon_opacity = 0.85

# ──────────────────────────────────────────────
# [gtk_extra] — CSS snippet ngoài được inject thêm
# Dành cho người dùng muốn override bằng raw GTK CSS
# ──────────────────────────────────────────────
[gtk_extra]
# Đường dẫn tới file .css bổ sung (để trống nếu không dùng)
extra_css_file  =
# CSS inline (có thể nhiều dòng, dùng \ để nối dòng)
inline_css      =
