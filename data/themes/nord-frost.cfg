# App Explorer Theme Configuration
# ╔══════════════════════════════════════════════════════════════════╗
# ║         APP EXPLORER — THEME: nord-frost                       ║
# ║   Inspired by Nord color palette — Arctic, north-bluish        ║
# ╚══════════════════════════════════════════════════════════════════╝
# Port of the popular Nord theme by Arctic Ice Studio
# Original Nord: https://www.nordtheme.com
#
# Nord palette reference:
#   Polar Night: #2E3440 #3B4252 #434C5E #4C566A
#   Snow Storm:  #D8DEE9 #E5E9F0 #ECEFF4
#   Frost:       #8FBCBB #88C0D0 #81A1C1 #5E81AC
#   Aurora:      #BF616A #D08770 #EBCB8B #A3BE8C #B48EAD

[theme]
name            = nord-frost
version         = 1.0
author          = App Explorer Community
description     = Nord-inspired dark theme, arctic and north-bluish
dark_mode       = true
follow_system   = false

[colors.base]
bg_primary      = #2E3440
bg_secondary    = #3B4252
bg_card         = #3B4252
bg_card_hover   = #434C5E
bg_card_selected= #4C566A
bg_elevated     = #3B4252
bg_sunken       = #2E3440
border_light    = #3B4252
border_normal   = #434C5E
border_focus    = #88C0D0
border_error    = #BF616A

[colors.text]
primary         = #ECEFF4
secondary       = #D8DEE9
disabled        = #4C566A
on_dark         = #ECEFF4
link            = #88C0D0
link_hover      = #8FBCBB
error           = #BF616A
success         = #A3BE8C
warning         = #EBCB8B
info            = #81A1C1

[colors.accent]
primary         = #5E81AC
hover           = #81A1C1
pressed         = #4C6A8E
light           = #3B4252
border          = #5E81AC

[colors.nav]
bg              = #2E3440
item_hover_bg   = #3B4252
item_active_bg  = #434C5E
item_text       = #D8DEE9
item_hover_text = #ECEFF4
item_active_text= #88C0D0
border          = #3B4252
shadow          = #00000060

[colors.button]
bg              = #3B4252
bg_hover        = #5E81AC
bg_pressed      = #4C6A8E
bg_disabled     = #3B4252
text            = #D8DEE9
text_hover      = #ECEFF4
text_pressed    = #ECEFF4
text_disabled   = #4C566A
border          = #434C5E
border_hover    = #5E81AC
border_pressed  = #4C6A8E
border_disabled = #3B4252

danger_bg           = #3B4252
danger_bg_hover     = #BF616A
danger_text         = #BF616A
danger_text_hover   = #ECEFF4
danger_border       = #BF616A
danger_border_hover = #9A4E57

primary_bg          = #5E81AC
primary_bg_hover    = #81A1C1
primary_text        = #ECEFF4
primary_text_hover  = #ECEFF4
primary_border      = #4C6A8E
primary_border_hover= #5E81AC

[colors.statusbar]
bg              = #2E3440
text            = #D8DEE9
border          = #3B4252
progress_bg     = #3B4252
progress_fill   = #88C0D0

[colors.console]
bg              = #242830
text            = #D8DEE9
text_cmd        = #88C0D0
text_stdout     = #D8DEE9
text_stderr     = #EBCB8B
text_error      = #BF616A
text_success    = #A3BE8C
text_info       = #81A1C1
border          = #3B4252
header_bg       = #1E2228
header_text     = #88C0D0

[colors.badge]
bg              = #434C5E
text            = #D8DEE9
border          = #4C566A
installed_bg    = #3D4F40
installed_text  = #A3BE8C
installed_border= #5A7A5E

[colors.scrollbar]
track           = #2E3440
thumb           = #4C566A
thumb_hover     = #5E6A7A
thumb_active    = #88C0D0

[colors.tooltip]
bg              = #3B4252
text            = #ECEFF4
border          = #4C566A

[colors.dialog]
bg              = #3B4252
overlay         = #00000080
header_bg       = #2E3440
header_text     = #ECEFF4
border          = #434C5E
shadow          = #00000060

[colors.search]
bg              = #2E3440
text            = #ECEFF4
placeholder     = #4C566A
border          = #434C5E
border_focus    = #88C0D0
icon            = #81A1C1
bg_focus        = #2E3440

[typography]
font_ui             = Noto Sans
font_ui_size        = 10
font_title          = Noto Sans
font_title_size     = 13
font_title_weight   = bold
font_subtitle       = Noto Sans
font_subtitle_size  = 9
font_mono           = JetBrains Mono
font_mono_size      = 9
font_button         = Noto Sans
font_button_size    = 10
font_button_weight  = normal
font_nav            = Noto Sans
font_nav_size       = 10
font_nav_weight     = normal
font_badge          = Noto Sans
font_badge_size     = 8

[layout]
window_width        = 1200
window_height       = 760
window_min_width    = 900
window_min_height   = 600
nav_width           = 210
nav_item_height     = 38
nav_item_padding_h  = 14
nav_item_padding_v  = 8
content_padding     = 18
content_gap         = 14
card_width          = 200
card_height         = 260
card_padding        = 14
card_gap            = 12
card_icon_size      = 56
list_row_height     = 68
list_icon_size      = 44
console_height      = 180
statusbar_height    = 26
toolbar_height      = 46
search_width        = 260
search_height       = 30

[radius]
window          = 0
card            = 8
button          = 6
button_small    = 4
input           = 6
tooltip         = 4
dialog          = 8
console         = 6
image           = 8
nav_item        = 6
progress        = 3
scrollbar_thumb = 4

[shadows]
card            = 0 2px 8px #00000040
card_hover      = 0 6px 16px #00000060
button          = none
dialog          = 0 8px 32px #00000080
nav             = 2px 0 12px #00000060
toolbar         = 0 2px 8px #00000040

[animation]
enabled         = true
hover_duration  = 120
transition      = 180
page_fade       = 80
easing          = ease-in-out

[misc]
show_console_auto           = true
collapse_console_on_finish  = true
default_view                = grid
grid_columns                = 4
show_category_badge         = true
show_installed_badge        = true
uninstalled_icon_opacity    = 0.75

[gtk_extra]
extra_css_file  =
inline_css      = \
  .nav-logo { letter-spacing: 2px; font-size: 11pt; } \
  .app-card { border-width: 1px; }
