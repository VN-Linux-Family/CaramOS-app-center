# App Explorer Theme Configuration
# ╔══════════════════════════════════════════════════════════════════╗
# ║     APP EXPLORER — THEME: catppuccin-mocha                     ║
# ║   Soothing pastel theme for the high-spirited!                 ║
# ╚══════════════════════════════════════════════════════════════════╝
# Port of Catppuccin Mocha by Catppuccin Org
# https://github.com/catppuccin/catppuccin
#
# Mocha palette:
#   Rosewater #F5E0DC  Flamingo  #F2CDCD  Pink    #F5C2E7
#   Mauve     #CBA6F7  Red       #F38BA8  Maroon  #EBA0AC
#   Peach     #FAB387  Yellow    #F9E2AF  Green   #A6E3A1
#   Teal      #94E2D5  Sky       #89DCEB  Sapphire#74C7EC
#   Blue      #89B4FA  Lavender  #B4BEFE
#   Base      #1E1E2E  Mantle    #181825  Crust   #11111B
#   Surface0  #313244  Surface1  #45475A  Surface2#585B70
#   Overlay0  #6C7086  Overlay1  #7F849C  Overlay2#9399B2
#   Subtext0  #A6ADC8  Subtext1  #BAC2DE  Text    #CDD6F4

[theme]
name            = catppuccin-mocha
version         = 1.0
author          = App Explorer Community
description     = Catppuccin Mocha — soothing pastel dark theme
dark_mode       = true
follow_system   = false

[colors.base]
bg_primary      = #1E1E2E
bg_secondary    = #181825
bg_card         = #313244
bg_card_hover   = #45475A
bg_card_selected= #3D3F53
bg_elevated     = #313244
bg_sunken       = #11111B
border_light    = #313244
border_normal   = #45475A
border_focus    = #89B4FA
border_error    = #F38BA8

[colors.text]
primary         = #CDD6F4
secondary       = #BAC2DE
disabled        = #585B70
on_dark         = #CDD6F4
link            = #89B4FA
link_hover      = #74C7EC
error           = #F38BA8
success         = #A6E3A1
warning         = #F9E2AF
info            = #89DCEB

[colors.accent]
primary         = #CBA6F7
hover           = #B4BEFE
pressed         = #A889E0
light           = #313244
border          = #CBA6F7

[colors.nav]
bg              = #181825
item_hover_bg   = #313244
item_active_bg  = #3D3F53
item_text       = #BAC2DE
item_hover_text = #CDD6F4
item_active_text= #CBA6F7
border          = #11111B
shadow          = #00000066

[colors.button]
bg              = #313244
bg_hover        = #CBA6F7
bg_pressed      = #A889E0
bg_disabled     = #1E1E2E
text            = #BAC2DE
text_hover      = #1E1E2E
text_pressed    = #1E1E2E
text_disabled   = #585B70
border          = #45475A
border_hover    = #CBA6F7
border_pressed  = #A889E0
border_disabled = #313244

danger_bg           = #313244
danger_bg_hover     = #F38BA8
danger_text         = #F38BA8
danger_text_hover   = #1E1E2E
danger_border       = #F38BA8
danger_border_hover = #C07090

primary_bg          = #CBA6F7
primary_bg_hover    = #B4BEFE
primary_text        = #1E1E2E
primary_text_hover  = #1E1E2E
primary_border      = #A889E0
primary_border_hover= #CBA6F7

[colors.statusbar]
bg              = #181825
text            = #BAC2DE
border          = #11111B
progress_bg     = #313244
progress_fill   = #CBA6F7

[colors.console]
bg              = #11111B
text            = #CDD6F4
text_cmd        = #A6E3A1
text_stdout     = #CDD6F4
text_stderr     = #F9E2AF
text_error      = #F38BA8
text_success    = #A6E3A1
text_info       = #89B4FA
border          = #313244
header_bg       = #0D0D18
header_text     = #A6E3A1

[colors.badge]
bg              = #45475A
text            = #CDD6F4
border          = #585B70
installed_bg    = #2A3A2E
installed_text  = #A6E3A1
installed_border= #4A7A54

[colors.scrollbar]
track           = #181825
thumb           = #45475A
thumb_hover     = #585B70
thumb_active    = #CBA6F7

[colors.tooltip]
bg              = #313244
text            = #CDD6F4
border          = #45475A

[colors.dialog]
bg              = #313244
overlay         = #00000088
header_bg       = #1E1E2E
header_text     = #CDD6F4
border          = #45475A
shadow          = #00000060

[colors.search]
bg              = #181825
text            = #CDD6F4
placeholder     = #585B70
border          = #45475A
border_focus    = #89B4FA
icon            = #6C7086
bg_focus        = #1E1E2E

[typography]
font_ui             = Inter
font_ui_size        = 10
font_title          = Inter
font_title_size     = 13
font_title_weight   = bold
font_subtitle       = Inter
font_subtitle_size  = 9
font_mono           = CaskaydiaCove Nerd Font
font_mono_size      = 9
font_button         = Inter
font_button_size    = 10
font_button_weight  = medium
font_nav            = Inter
font_nav_size       = 10
font_nav_weight     = normal
font_badge          = Inter
font_badge_size     = 8

[layout]
window_width        = 1200
window_height       = 760
window_min_width    = 900
window_min_height   = 600
nav_width           = 220
nav_item_height     = 42
nav_item_padding_h  = 16
nav_item_padding_v  = 10
content_padding     = 20
content_gap         = 16
card_width          = 210
card_height         = 270
card_padding        = 16
card_gap            = 14
card_icon_size      = 60
list_row_height     = 72
list_icon_size      = 48
console_height      = 200
statusbar_height    = 28
toolbar_height      = 50
search_width        = 280
search_height       = 34

[radius]
window          = 8
card            = 12
button          = 8
button_small    = 6
input           = 8
tooltip         = 6
dialog          = 12
console         = 8
image           = 10
nav_item        = 8
progress        = 4
scrollbar_thumb = 4

[shadows]
card            = 0 4px 12px #00000050
card_hover      = 0 8px 24px #00000070
button          = none
dialog          = 0 12px 40px #00000090
nav             = 4px 0 16px #00000060
toolbar         = 0 2px 10px #00000050

[animation]
enabled         = true
hover_duration  = 100
transition      = 150
page_fade       = 80
easing          = ease-out

[misc]
show_console_auto           = true
collapse_console_on_finish  = true
default_view                = grid
grid_columns                = 4
show_category_badge         = true
show_installed_badge        = true
uninstalled_icon_opacity    = 0.7

[gtk_extra]
extra_css_file  =
inline_css      = \
  .nav-logo { letter-spacing: 1px; text-transform: uppercase; font-size: 9pt; } \
  .app-card { transition: all 150ms ease-out; } \
  .badge { border-radius: 99px; }
